services:
  postgres:
    image: postgres:16-alpine
    container_name: darna-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: darna
      POSTGRES_USER: darna
      POSTGRES_PASSWORD: darna_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U darna -d darna"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: darna-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: darna-api
    restart: unless-stopped
    working_dir: /var/www/api
    volumes:
      - ./apps/api:/var/www/api
    ports:
      - "8000:8000"
    environment:
      APP_NAME: Darna
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      APP_KEY: base64:dGFybmFkZXZlbG9wbWVudGtleTEyMzQ1Njc4OTBhYmM=
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: darna
      DB_USERNAME: darna
      DB_PASSWORD: darna_secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID: darna
      REVERB_APP_KEY: darna-reverb-key
      REVERB_APP_SECRET: darna-reverb-secret
      REVERB_HOST: reverb
      REVERB_PORT: 8080
      REVERB_SCHEME: http
      SANCTUM_STATEFUL_DOMAINS: localhost:3000,127.0.0.1:3000
      FRONTEND_URL: http://localhost:3000
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "composer install --no-interaction &&
             php artisan key:generate --force &&
             php artisan migrate --force &&
             php artisan db:seed --force &&
             php artisan serve --host=0.0.0.0 --port=8000"

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: darna-queue
    restart: unless-stopped
    working_dir: /var/www/api
    volumes:
      - ./apps/api:/var/www/api
    environment:
      APP_NAME: Darna
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      APP_KEY: base64:dGFybmFkZXZlbG9wbWVudGtleTEyMzQ1Njc4OTBhYmM=
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: darna
      DB_USERNAME: darna
      DB_PASSWORD: darna_secret
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID: darna
      REVERB_APP_KEY: darna-reverb-key
      REVERB_APP_SECRET: darna-reverb-secret
      REVERB_HOST: reverb
      REVERB_PORT: 8080
      REVERB_SCHEME: http
    depends_on:
      - api
      - redis
    command: sh -c "composer install --no-interaction && php artisan queue:work --sleep=1 --tries=3"

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: darna-scheduler
    restart: unless-stopped
    working_dir: /var/www/api
    volumes:
      - ./apps/api:/var/www/api
    environment:
      APP_NAME: Darna
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      APP_KEY: base64:dGFybmFkZXZlbG9wbWVudGtleTEyMzQ1Njc4OTBhYmM=
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: darna
      DB_USERNAME: darna
      DB_PASSWORD: darna_secret
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID: darna
      REVERB_APP_KEY: darna-reverb-key
      REVERB_APP_SECRET: darna-reverb-secret
      REVERB_HOST: reverb
      REVERB_PORT: 8080
      REVERB_SCHEME: http
    depends_on:
      - api
    command: sh -c "composer install --no-interaction && php artisan schedule:work"

  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: darna-reverb
    restart: unless-stopped
    working_dir: /var/www/api
    volumes:
      - ./apps/api:/var/www/api
    ports:
      - "8080:8080"
    environment:
      APP_NAME: Darna
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      APP_KEY: base64:dGFybmFkZXZlbG9wbWVudGtleTEyMzQ1Njc4OTBhYmM=
      REDIS_HOST: redis
      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID: darna
      REVERB_APP_KEY: darna-reverb-key
      REVERB_APP_SECRET: darna-reverb-secret
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8080
      REVERB_HOST: 0.0.0.0
      REVERB_PORT: 8080
      REVERB_SCHEME: http
    depends_on:
      - redis
      - api
    command: sh -c "composer install --no-interaction && php artisan reverb:start --host=0.0.0.0 --port=8080"

  web:
    image: node:22-alpine
    container_name: darna-web
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_REVERB_KEY: darna-reverb-key
      NEXT_PUBLIC_REVERB_HOST: localhost
      NEXT_PUBLIC_REVERB_PORT: "8080"
      NEXT_PUBLIC_REVERB_SCHEME: http
      NEXT_PUBLIC_BRANCH_SLUG: downtown
      WATCHPACK_POLLING: "true"
    depends_on:
      - api
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"

volumes:
  postgres_data:
  redis_data:
  web_node_modules:
